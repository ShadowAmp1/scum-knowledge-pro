<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ammoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 7.62 AP Bullet -->
  <g filter="url(#glow)">
    <!-- Bullet -->
    <rect x="14" y="8" width="12" height="14" rx="6" fill="url(#ammoGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Case -->
    <rect x="15" y="22" width="10" height="13" rx="1" fill="url(#ammoGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Primer -->
    <circle cx="20" cy="33" r="2" fill="#ef4444" opacity="0.6"/>
    
    <!-- AP tip -->
    <rect x="16" y="6" width="8" height="4" rx="4" fill="#ef4444" opacity="0.8"/>
  </g>
  
  <!-- Label -->
  <text x="20" y="38" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="6" opacity="0.5">7.62</text>
</svg>
