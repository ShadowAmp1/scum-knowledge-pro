<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ammoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 12G Slug Bullet -->
  <g filter="url(#glow)">
    <!-- Large slug bullet -->
    <rect x="12" y="8" width="16" height="18" rx="8" fill="url(#ammoGradient)" stroke="#8b5cf6" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Case -->
    <rect x="14" y="26" width="12" height="9" rx="1" fill="url(#ammoGradient)" stroke="#8b5cf6" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Primer -->
    <circle cx="20" cy="33" r="2" fill="#8b5cf6" opacity="0.6"/>
    
    <!-- Slug markings -->
    <rect x="16" y="12" width="8" height="2" fill="#8b5cf6" opacity="0.4"/>
    <rect x="16" y="16" width="8" height="2" fill="#8b5cf6" opacity="0.4"/>
  </g>
  
  <!-- Label -->
  <text x="20" y="38" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="6" opacity="0.5">12G</text>
</svg>
