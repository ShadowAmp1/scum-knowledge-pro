<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ammoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 5.56 FMJ Bullet -->
  <g filter="url(#glow)">
    <!-- Bullet -->
    <rect x="15" y="8" width="10" height="12" rx="5" fill="url(#ammoGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Case -->
    <rect x="16" y="20" width="8" height="15" rx="1" fill="url(#ammoGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Primer -->
    <circle cx="20" cy="33" r="2" fill="#fbbf24" opacity="0.6"/>
    
    <!-- FMJ marking -->
    <rect x="17" y="10" width="6" height="2" fill="#fbbf24" opacity="0.4"/>
  </g>
  
  <!-- Label -->
  <text x="20" y="38" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="6" opacity="0.5">5.56</text>
</svg>
