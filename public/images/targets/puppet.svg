<svg width="80" height="100" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="targetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Puppet Robot Silhouette -->
  <g filter="url(#glow)">
    <!-- Robot head -->
    <rect x="32" y="8" width="16" height="12" rx="2" fill="url(#targetGradient)" stroke="#f59e0b" stroke-width="0.5" opacity="0.9"/>
    <circle cx="36" cy="14" r="2" fill="#f59e0b" opacity="0.6"/>
    <circle cx="44" cy="14" r="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="38" y="16" width="4" height="2" fill="#f59e0b" opacity="0.4"/>
    
    <!-- Robot body -->
    <rect x="28" y="20" width="24" height="30" rx="3" fill="url(#targetGradient)" stroke="#f59e0b" stroke-width="0.5" opacity="0.9"/>
    <rect x="30" y="22" width="20" height="26" rx="2" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <rect x="35" y="25" width="10" height="8" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <circle cx="40" cy="35" r="3" fill="#f59e0b" opacity="0.3"/>
    
    <!-- Robot arms -->
    <rect x="18" y="25" width="8" height="20" rx="2" fill="url(#targetGradient)" stroke="#f59e0b" stroke-width="0.5" opacity="0.9"/>
    <rect x="54" y="25" width="8" height="20" rx="2" fill="url(#targetGradient)" stroke="#f59e0b" stroke-width="0.5" opacity="0.9"/>
    <circle cx="22" cy="30" r="2" fill="#f59e0b" opacity="0.4"/>
    <circle cx="58" cy="30" r="2" fill="#f59e0b" opacity="0.4"/>
    
    <!-- Robot legs -->
    <rect x="32" y="50" width="8" height="25" rx="2" fill="url(#targetGradient)" stroke="#f59e0b" stroke-width="0.5" opacity="0.9"/>
    <rect x="40" y="50" width="8" height="25" rx="2" fill="url(#targetGradient)" stroke="#f59e0b" stroke-width="0.5" opacity="0.9"/>
    <rect x="34" y="52" width="4" height="20" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <rect x="42" y="52" width="4" height="20" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Hit zones indicators -->
    <circle cx="40" cy="14" r="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="38" y="30" width="4" height="4" fill="#f59e0b" opacity="0.6"/>
    <rect x="22" y="30" width="4" height="4" fill="#f59e0b" opacity="0.6"/>
    <rect x="54" y="30" width="4" height="4" fill="#f59e0b" opacity="0.6"/>
    <rect x="35" y="55" width="4" height="4" fill="#f59e0b" opacity="0.6"/>
    <rect x="41" y="55" width="4" height="4" fill="#f59e0b" opacity="0.6"/>
  </g>
  
  <!-- Label -->
  <text x="40" y="85" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8" opacity="0.5">PUPPET</text>
</svg>
