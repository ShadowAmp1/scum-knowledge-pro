<svg width="80" height="100" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="targetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Light Armor Player Silhouette -->
  <g filter="url(#glow)">
    <!-- Head with helmet -->
    <circle cx="40" cy="15" r="8" fill="url(#targetGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    <path d="M 32 10 Q 40 5, 48 10" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
    
    <!-- Body with vest -->
    <rect x="30" y="23" width="20" height="25" rx="3" fill="url(#targetGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    <rect x="28" y="25" width="24" height="20" rx="2" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Arms -->
    <rect x="20" y="25" width="8" height="18" rx="2" fill="url(#targetGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    <rect x="52" y="25" width="8" height="18" rx="2" fill="url(#targetGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Legs with light armor -->
    <rect x="32" y="48" width="7" height="25" rx="2" fill="url(#targetGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    <rect x="41" y="48" width="7" height="25" rx="2" fill="url(#targetGradient)" stroke="#fbbf24" stroke-width="0.5" opacity="0.9"/>
    <rect x="31" y="48" width="9" height="8" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
    <rect x="40" y="48" width="9" height="8" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Hit zones indicators -->
    <circle cx="40" cy="15" r="2" fill="#fbbf24" opacity="0.6"/>
    <rect x="38" y="30" width="4" height="4" fill="#fbbf24" opacity="0.6"/>
    <rect x="24" y="30" width="4" height="4" fill="#fbbf24" opacity="0.6"/>
    <rect x="52" y="30" width="4" height="4" fill="#fbbf24" opacity="0.6"/>
    <rect x="35" y="55" width="4" height="4" fill="#fbbf24" opacity="0.6"/>
    <rect x="41" y="55" width="4" height="4" fill="#fbbf24" opacity="0.6"/>
  </g>
  
  <!-- Label -->
  <text x="40" y="85" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8" opacity="0.5">LIGHT</text>
</svg>
