<svg width="80" height="100" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="targetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Mech Robot Silhouette -->
  <g filter="url(#glow)">
    <!-- Mech head -->
    <rect x="30" y="5" width="20" height="15" rx="3" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="35" y="8" width="10" height="8" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    <circle cx="38" cy="12" r="1.5" fill="#ef4444" opacity="0.6"/>
    <circle cx="42" cy="12" r="1.5" fill="#ef4444" opacity="0.6"/>
    
    <!-- Heavy mech body -->
    <rect x="25" y="20" width="30" height="35" rx="3" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="27" y="22" width="26" height="31" rx="2" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
    <rect x="32" y="25" width="16" height="12" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    <circle cx="40" cy="35" r="4" fill="#ef4444" opacity="0.3"/>
    <rect x="35" y="40" width="10" height="8" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Heavy mech arms -->
    <rect x="12" y="25" width="10" height="25" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="58" y="25" width="10" height="25" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="11" y="27" width="12" height="21" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    <rect x="57" y="27" width="12" height="21" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    <circle cx="17" cy="35" r="2" fill="#ef4444" opacity="0.4"/>
    <circle cx="63" cy="35" r="2" fill="#ef4444" opacity="0.4"/>
    
    <!-- Heavy mech legs -->
    <rect x="30" y="55" width="10" height="30" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="40" y="55" width="10" height="30" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="32" y="57" width="6" height="26" fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.4"/>
    <rect x="42" y="57" width="6" height="26" fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.4"/>
    <rect x="28" y="75" width="14" height="8" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="38" y="75" width="14" height="8" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Hit zones indicators -->
    <circle cx="40" cy="12" r="2" fill="#ef4444" opacity="0.6"/>
    <rect x="38" y="30" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="17" y="30" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="59" y="30" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="33" y="60" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="43" y="60" width="4" height="4" fill="#ef4444" opacity="0.6"/>
  </g>
  
  <!-- Label -->
  <text x="40" y="90" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8" opacity="0.5">MECH</text>
</svg>
