<svg width="80" height="100" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="targetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Heavy Armor Player Silhouette -->
  <g filter="url(#glow)">
    <!-- Head with full helmet -->
    <circle cx="40" cy="15" r="8" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <path d="M 30 8 Q 40 3, 50 8 L 50 12 Q 40 7, 30 12 Z" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.6"/>
    
    <!-- Body with heavy vest -->
    <rect x="30" y="23" width="20" height="25" rx="3" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="26" y="25" width="28" height="22" rx="2" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
    <rect x="35" y="28" width="10" height="8" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Arms with armor -->
    <rect x="20" y="25" width="8" height="18" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="52" y="25" width="8" height="18" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="19" y="27" width="10" height="14" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    <rect x="51" y="27" width="10" height="14" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Legs with heavy armor -->
    <rect x="32" y="48" width="7" height="25" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="41" y="48" width="7" height="25" rx="2" fill="url(#targetGradient)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <rect x="30" y="48" width="11" height="12" fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.4"/>
    <rect x="39" y="48" width="11" height="12" fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.4"/>
    
    <!-- Hit zones indicators -->
    <circle cx="40" cy="15" r="2" fill="#ef4444" opacity="0.6"/>
    <rect x="38" y="30" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="24" y="30" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="52" y="30" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="35" y="55" width="4" height="4" fill="#ef4444" opacity="0.6"/>
    <rect x="41" y="55" width="4" height="4" fill="#ef4444" opacity="0.6"/>
  </g>
  
  <!-- Label -->
  <text x="40" y="85" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8" opacity="0.5">HEAVY</text>
</svg>
