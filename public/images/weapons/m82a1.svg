<svg width="160" height="80" viewBox="0 0 160 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weaponGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- M82A1 Sniper Silhouette -->
  <g filter="url(#glow)">
    <!-- Main body -->
    <rect x="30" y="25" width="70" height="30" rx="3" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Long barrel -->
    <rect x="100" y="35" width="45" height="10" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Magazine -->
    <rect x="35" y="50" width="18" height="20" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Bipod -->
    <rect x="85" y="50" width="25" height="3" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    <rect x="90" y="53" width="3" height="15" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    <rect x="102" y="53" width="3" height="15" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Scope -->
    <rect x="60" y="18" width="30" height="8" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    <rect x="75" y="22" width="8" height="4" fill="#ff5030" opacity="0.6"/>
    
    <!-- Pistol grip -->
    <rect x="50" y="52" width="15" height="18" rx="3" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
  </g>
  
  <!-- SCUM DB PRO Brand -->
  <text x="80" y="75" text-anchor="middle" fill="#ff5030" font-family="monospace" font-size="8" opacity="0.5">SCUM DB PRO</text>
</svg>
