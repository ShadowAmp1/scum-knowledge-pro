<svg width="160" height="80" viewBox="0 0 160 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weaponGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- M1887 Shotgun Silhouette -->
  <g filter="url(#glow)">
    <!-- Main body -->
    <rect x="25" y="30" width="60" height="25" rx="3" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Dual barrels -->
    <rect x="85" y="32" width="40" height="8" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    <rect x="85" y="42" width="40" height="8" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Lever action -->
    <rect x="20" y="40" width="25" height="8" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    <circle cx="15" cy="44" r="4" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Stock -->
    <rect x="10" y="25" width="20" height="35" rx="3" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Trigger guard -->
    <rect x="45" y="50" width="15" height="12" rx="2" fill="none" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
  </g>
  
  <!-- SCUM DB PRO Brand -->
  <text x="80" y="75" text-anchor="middle" fill="#ff5030" font-family="monospace" font-size="8" opacity="0.5">SCUM DB PRO</text>
</svg>
