<svg width="160" height="80" viewBox="0 0 160 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weaponGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- UMP-45 SMG Silhouette -->
  <g filter="url(#glow)">
    <!-- Main body -->
    <rect x="30" y="35" width="65" height="15" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Barrel -->
    <rect x="95" y="40" width="30" height="5" rx="1" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Magazine -->
    <rect x="35" y="45" width="18" height="18" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Foldable stock -->
    <rect x="15" y="30" width="20" height="25" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    <rect x="10" y="35" width="8" height="15" rx="1" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Sight -->
    <rect x="75" y="32" width="8" height="3" fill="#ff5030" opacity="0.6"/>
    
    <!-- Grip -->
    <rect x="55" y="48" width="12" height="12" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
  </g>
  
  <!-- SCUM DB PRO Brand -->
  <text x="80" y="75" text-anchor="middle" fill="#ff5030" font-family="monospace" font-size="8" opacity="0.5">SCUM DB PRO</text>
</svg>
