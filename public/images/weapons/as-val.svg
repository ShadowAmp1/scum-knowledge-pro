<svg width="160" height="80" viewBox="0 0 160 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weaponGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- AS-VAL Silhouette -->
  <g filter="url(#glow)">
    <!-- Main body -->
    <rect x="30" y="35" width="70" height="18" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Barrel with suppressor -->
    <rect x="100" y="38" width="40" height="8" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    <rect x="140" y="36" width="15" height="12" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Magazine -->
    <rect x="35" y="48" width="20" height="22" rx="2" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Stock -->
    <rect x="15" y="28" width="20" height="32" rx="3" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Sight -->
    <rect x="80" y="30" width="12" height="4" fill="#ff5030" opacity="0.6"/>
    
    <!-- Grip -->
    <rect x="55" y="50" width="14" height="18" rx="3" fill="url(#weaponGradient)" stroke="#ff5030" stroke-width="0.5" opacity="0.9"/>
  </g>
  
  <!-- SCUM DB PRO Brand -->
  <text x="80" y="75" text-anchor="middle" fill="#ff5030" font-family="monospace" font-size="8" opacity="0.5">SCUM DB PRO</text>
</svg>
