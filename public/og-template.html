<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=630">
    <title>SCUM DB PRO - OG Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #000000 0%, #1a0000 50%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .bg-pattern {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(220, 38, 38, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(220, 38, 38, 0.1) 0%, transparent 50%);
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .skull {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 3px solid rgba(220, 38, 38, 0.4);
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.5);
        }
        h1 {
            font-size: 96px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }
        .subtitle {
            font-size: 36px;
            font-weight: 700;
            color: #fca5a5;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }
        .features {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
        }
        .feature {
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid rgba(220, 38, 38, 0.3);
            border-radius: 16px;
            padding: 16px 28px;
            font-size: 24px;
            font-weight: 700;
            color: #fca5a5;
            backdrop-filter: blur(10px);
        }
        .url {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 600;
            color: #71717a;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <div class="logo">
            <div class="skull">💀</div>
        </div>
        <h1>SCUM DB PRO</h1>
        <div class="subtitle">База знаний по SCUM</div>
        <div class="features">
            <div class="feature">Оружие</div>
            <div class="feature">Обвесы</div>
            <div class="feature">Лут</div>
            <div class="feature">Бункеры</div>
            <div class="feature">Карта</div>
            <div class="feature">Гайды</div>
        </div>
    </div>
    <div class="url">scumdbpro.duckdns.org</div>
</body>
</html>
