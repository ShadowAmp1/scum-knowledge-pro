services:
  - type: web
    name: scum-knowledge-pro
    env: node
    plan: free
    region: frankfurt
    buildCommand: if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run validate:data && npm run build
    preDeployCommand: npm run db:migrate && npm run db:seed
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SITE_URL
        value: https://scumdbpro.duckdns.org
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: scum-knowledge-pro-db
          property: connectionString

databases:
  - name: scum-knowledge-pro-db
    region: frankfurt
    plan: free
