services:
  - type: web
    name: scum-knowledge-pro
    env: node
    plan: free
    region: frankfurt
    buildCommand: if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run validate:data && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
