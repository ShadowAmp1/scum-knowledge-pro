services:
  - type: web
    name: scum-knowledge-pro
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run validate:data && npm run build
    preDeployCommand: npm run db:migrate && npm run db:seed
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NODE_ENV
        value: production
      - key: ADMIN_USER
        value: Shadow
      - key: ADMIN_PASSWORD
        value: "5623741"
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: scum-knowledge-pro-db
          property: connectionString

databases:
  - name: scum-knowledge-pro-db
    region: frankfurt
    plan: free
